name: Release npm Package

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  go-test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      CGO_ENABLED: '0'
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - name: Run Go tests
        run: make test

  publish-ghcr:
    needs: go-test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - name: Build embedded dashboard assets
        run: ./scripts/ensure_dashboard_dist.sh

      - name: Derive release version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Derive Go version
        id: go-version
        run: echo "value=$(awk '/^go / { print $2; exit }' go.mod)" >> "$GITHUB_OUTPUT"

      - name: Derive Codex CLI version
        id: codex-version
        run: echo "value=$(./scripts/codex_supported_version.sh)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=Maestro
            org.opencontainers.image.description=Local-first orchestration runtime for agent-driven software work
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GO_VERSION=${{ steps.go-version.outputs.value }}
            MAESTRO_VERSION=${{ steps.version.outputs.value }}
            VCS_REF=${{ github.sha }}
            CODEX_VERSION=${{ steps.codex-version.outputs.value }}

  build-root-package:
    needs: go-test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - name: Build root package
        run: ./scripts/package_npm_release.sh pack-root "${GITHUB_REF_NAME}"

      - name: Upload root tarball
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: npm-root-package
          path: dist/npm/olhapi-maestro-*.tgz
          if-no-files-found: error

  registry-install-smoke:
    needs:
      - publish-ghcr
      - build-root-package
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - name: Download npm artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/npm
          pattern: npm-root-package
          merge-multiple: true

      - name: Smoke runtime image (amd64)
        run: DOCKER_PLATFORM=linux/amd64 ./scripts/smoke_runtime_image.sh "ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME#v}"

      - name: Smoke runtime image (arm64)
        run: DOCKER_PLATFORM=linux/arm64 ./scripts/smoke_runtime_image.sh "ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME#v}"

      - name: Smoke test npm install
        run: MAESTRO_SMOKE_IMAGE="ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME#v}" ./scripts/smoke_npm_package.sh "${GITHUB_REF_NAME}"

      - name: Smoke test root-only npm install through local registry
        run: MAESTRO_SMOKE_IMAGE="ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME#v}" ./scripts/smoke_npm_registry_install.sh "${GITHUB_REF_NAME}"

  publish-npm:
    if: vars.NPM_PUBLISH_ENABLED == 'true'
    needs:
      - publish-ghcr
      - build-root-package
      - registry-install-smoke
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download npm artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/npm
          pattern: npm-root-package
          merge-multiple: true

      - name: Select npm dist-tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "NPM_DIST_TAG=next" >>"$GITHUB_ENV"
          else
            echo "NPM_DIST_TAG=latest" >>"$GITHUB_ENV"
          fi

      - name: Publish npm package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm publish --access public --provenance --tag "$NPM_DIST_TAG" "dist/npm/olhapi-maestro-${VERSION}.tgz"
