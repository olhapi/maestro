name: Release npm Package

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  go-test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      CGO_ENABLED: '0'
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Run Go tests
        run: make test

  build-leaf-packages:
    needs: go-test
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
            tarball_glob: olhapi-maestro-darwin-arm64-*.tgz
          - target: darwin-x64
            runner: macos-15-intel
            tarball_glob: olhapi-maestro-darwin-x64-*.tgz
          - target: linux-x64-gnu
            runner: ubuntu-24.04
            tarball_glob: olhapi-maestro-linux-x64-gnu-*.tgz
          - target: linux-arm64-gnu
            runner: ubuntu-24.04-arm
            tarball_glob: olhapi-maestro-linux-arm64-gnu-*.tgz
          - target: win32-x64
            runner: windows-2022
            tarball_glob: olhapi-maestro-win32-x64-*.tgz
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Build leaf package
        run: ./scripts/package_npm_release.sh pack-leaf "${GITHUB_REF_NAME}" "${{ matrix.target }}"

      - name: Build root package for smoke test
        run: ./scripts/package_npm_release.sh pack-root "${GITHUB_REF_NAME}"

      - name: Smoke test npm install
        run: ./scripts/smoke_npm_package.sh "${GITHUB_REF_NAME}" "${{ matrix.target }}"

      - name: Upload leaf tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-leaf-${{ matrix.target }}
          path: dist/npm/${{ matrix.tarball_glob }}
          if-no-files-found: error

  build-root-package:
    needs: go-test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Build root package
        run: ./scripts/package_npm_release.sh pack-root "${GITHUB_REF_NAME}"

      - name: Upload root tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-root-package
          path: dist/npm/olhapi-maestro-*.tgz
          if-no-files-found: error

  registry-install-smoke:
    needs:
      - build-leaf-packages
      - build-root-package
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
          - target: darwin-x64
            runner: macos-15-intel
          - target: linux-x64-gnu
            runner: ubuntu-24.04
          - target: linux-arm64-gnu
            runner: ubuntu-24.04-arm
          - target: win32-x64
            runner: windows-2022
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Download npm artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/npm
          pattern: npm-*
          merge-multiple: true

      - name: Smoke test root-only npm install through local registry
        run: ./scripts/smoke_npm_registry_install.sh "${GITHUB_REF_NAME}" "${{ matrix.target }}"

  publish-npm:
    if: vars.NPM_PUBLISH_ENABLED == 'true'
    needs:
      - build-leaf-packages
      - build-root-package
      - registry-install-smoke
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download npm artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/npm
          pattern: npm-*
          merge-multiple: true

      - name: Select npm dist-tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "NPM_DIST_TAG=next" >>"$GITHUB_ENV"
          else
            echo "NPM_DIST_TAG=latest" >>"$GITHUB_ENV"
          fi

      - name: Publish npm packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for tarball in \
            "dist/npm/olhapi-maestro-darwin-arm64-${VERSION}.tgz" \
            "dist/npm/olhapi-maestro-darwin-x64-${VERSION}.tgz" \
            "dist/npm/olhapi-maestro-linux-x64-gnu-${VERSION}.tgz" \
            "dist/npm/olhapi-maestro-linux-arm64-gnu-${VERSION}.tgz" \
            "dist/npm/olhapi-maestro-win32-x64-${VERSION}.tgz" \
            "dist/npm/olhapi-maestro-${VERSION}.tgz"; do
            npm publish --access public --provenance --tag "$NPM_DIST_TAG" "$tarball"
          done
