name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run Go tests
        run: make test
      - name: Run shared retry stress test
        run: go test ./internal/orchestrator -run TestSharedDBStressPreventsRunawayRetriesAndLockContention -count=1

  go-race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run Go race tests
        run: make test-race

  go-cover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run Go coverage gates
        run: make test-cover

  npm-packaging-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Run npm packaging unit tests
        run: node --test packaging/npm/root/lib/get-exe-path.test.js

  npm-root-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Build root package
        run: ./scripts/package_npm_release.sh pack-root 0.0.0-ci
      - name: Upload root tarball
        uses: actions/upload-artifact@v7
        with:
          name: npm-root-package
          path: dist/npm/olhapi-maestro-0.0.0-ci.tgz
          if-no-files-found: error

  go-platform-smoke:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
          - target: darwin-x64
            runner: macos-15-intel
          - target: linux-x64-gnu
            runner: ubuntu-24.04
          - target: linux-arm64-gnu
            runner: ubuntu-24.04-arm
          - target: win32-x64
            runner: windows-2022
            needs_msys2: true
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Windows GCC toolchain
        if: matrix.needs_msys2
        shell: pwsh
        run: |
          choco install msys2 --no-progress -y
          $msys2Root = 'C:\tools\msys64'
          if (-not (Test-Path $msys2Root)) {
            throw "MSYS2 install not found at $msys2Root"
          }

          $bash = Join-Path $msys2Root 'usr\bin\bash.exe'
          & $bash -lc 'pacman --noconfirm -Syuu'
          & $bash -lc 'pacman --noconfirm -S --needed mingw-w64-ucrt-x86_64-gcc'

          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $msys2Root 'ucrt64\bin')
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $msys2Root 'usr\bin')
          Add-Content -Path $env:GITHUB_ENV -Value 'CC=gcc'
      - name: Build leaf package
        run: ./scripts/package_npm_release.sh pack-leaf 0.0.0-ci "${{ matrix.target }}"
      - name: Build root package
        run: ./scripts/package_npm_release.sh pack-root 0.0.0-ci
      - name: Smoke test npm install
        run: ./scripts/smoke_npm_package.sh 0.0.0-ci "${{ matrix.target }}"
      - name: Upload leaf tarball
        uses: actions/upload-artifact@v7
        with:
          name: npm-leaf-${{ matrix.target }}
          path: dist/npm/olhapi-maestro-${{ matrix.target }}-0.0.0-ci.tgz
          if-no-files-found: error

  npm-registry-smoke:
    needs:
      - npm-root-package
      - go-platform-smoke
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
          - target: darwin-x64
            runner: macos-15-intel
          - target: linux-x64-gnu
            runner: ubuntu-24.04
          - target: linux-arm64-gnu
            runner: ubuntu-24.04-arm
          - target: win32-x64
            runner: windows-2022
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Download npm artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist/npm
          pattern: npm-*
          merge-multiple: true
      - name: Smoke test root-only npm install through local registry
        run: ./scripts/smoke_npm_registry_install.sh 0.0.0-ci "${{ matrix.target }}"

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Enable corepack
        run: corepack enable
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Run frontend tests
        run: pnpm run frontend:test

  website-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Enable corepack
        run: corepack enable
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Run website checks
        run: pnpm run website:check
      - name: Run website build
        run: pnpm run website:build
      - name: Run website tests
        run: pnpm run website:test
      - name: Run website smoke checks
        run: pnpm run website:smoke

  retry-safety-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run retry safety end-to-end harness
        env:
          E2E_KEEP_HARNESS: '0'
        run: make e2e-retry-safety
