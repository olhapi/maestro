name: CI

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:
  schedule:
    - cron: '0 3 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run Go tests
        run: make test
      - name: Run shared retry stress test
        run: go test ./internal/orchestrator -run TestSharedDBStressPreventsRunawayRetriesAndLockContention -count=1

  go-race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run Go race tests
        run: make test-race

  go-cover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run Go coverage gates
        run: make test-cover

  npm-packaging-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Run npm packaging unit tests
        run: node --test packaging/npm/root/lib/get-exe-path.test.js

  go-platform-smoke:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
          - target: darwin-x64
            runner: macos-15-intel
          - target: linux-x64-gnu
            runner: ubuntu-24.04
          - target: linux-arm64-gnu
            runner: ubuntu-24.04-arm
          - target: win32-x64
            runner: windows-2022
            needs_msys2: true
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Windows GCC toolchain
        if: matrix.needs_msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          path-type: inherit
          install: mingw-w64-ucrt-x86_64-gcc
      - name: Configure Windows GCC
        if: matrix.needs_msys2
        run: echo "CC=gcc" >> "$GITHUB_ENV"
      - name: Build leaf package
        run: ./scripts/package_npm_release.sh pack-leaf 0.0.0-ci "${{ matrix.target }}"
      - name: Build root package
        run: ./scripts/package_npm_release.sh pack-root 0.0.0-ci
      - name: Smoke test npm install
        run: ./scripts/smoke_npm_package.sh 0.0.0-ci "${{ matrix.target }}"

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend tests
        run: npm run test:ci

  website-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install website dependencies
        run: npm ci
      - name: Run website checks
        run: npm run check
      - name: Run website build
        run: npm run build
      - name: Run website tests
        run: npm run test:ci
      - name: Run website smoke checks
        run: npm run smoke

  retry-safety-e2e:
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run retry safety end-to-end harness
        run: make e2e-retry-safety
